services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: springboot-rules-demo-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "${KAFKA_CONTROLLER_PORT:-9093}:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  mongo:
    image: mongo:7
    container_name: springboot-rules-demo-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 12

  redis:
    image: redis:7
    container_name: springboot-rules-demo-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 12

  app:
    build: .
    container_name: springboot-rules-demo-app
    ports:
      - "${APP_PORT:-8081}:${CONTAINER_APP_PORT:-8080}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/ruleaudit}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-demo}
      SERVER_PORT: ${CONTAINER_APP_PORT:-8080}

  ui:
    build:
      context: ./frontend
    container_name: springboot-rules-demo-ui
    ports:
      - "${UI_PORT:-8080}:${CONTAINER_UI_PORT:-80}"
    depends_on:
      - app
    environment:
      NGINX_PORT: ${CONTAINER_UI_PORT:-80}
      BACKEND_URL: http://app:${CONTAINER_APP_PORT:-8080}
