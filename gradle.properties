# Pin the Gradle launcher JVM to the installed JDK 21 (Homebrew openjdk@21).
# The host default is JDK 26, which Gradle 8.10.2 cannot run on. The compile
# toolchain (build.gradle.kts) is also Java 21, so launcher and toolchain match.
org.gradle.java.home=/opt/homebrew/Cellar/openjdk@21/21.0.11/libexec/openjdk.jdk/Contents/Home
