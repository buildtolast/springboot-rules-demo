server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: springboot-rules-demo
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://host.docker.internal:27017/ruleaudit}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:host.docker.internal}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:host.docker.internal:9092}
    streams:
      application-id: rule-audit-streams
      replication-factor: ${APP_REPLICATION_FACTOR:1}
      # PipelineStarter starts streams after rules are loaded
      auto-startup: false
      properties:
        processing.guarantee: exactly_once_v2
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        default.value.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        commit.interval.ms: 1000
        num.stream.threads: 1
        # single-broker EOS: internal/txn topics must tolerate RF=1
        # When running in cluster, use standard replication factors
        internal.topic.replication.factor: ${APP_REPLICATION_FACTOR:1}
        transaction.state.log.replication.factor: ${APP_REPLICATION_FACTOR:1}
        transaction.state.log.min.isr: 1
        default.deserialization.exception.handler: org.apache.kafka.streams.errors.LogAndContinueExceptionHandler
    consumer:
      group-id: audit-writer
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        # EOS: only consume records from committed Streams transactions
        isolation.level: read_committed
        # Batch sizing for the audit writer: accumulate a chunk per poll so each
        # MongoDB bulkWrite amortises one w:majority round-trip over many records.
        max.poll.records: 500
        fetch.min.bytes: 1048576    # wait for ~1 MiB before returning a fetch
        fetch.max.wait.ms: 200      # ...but never block a poll longer than 200ms
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: manual_immediate

app:
  topics:
    source: source-events
    target: target-events
    audit: audit-events
    audit-dlt: audit-events.DLT
  partitions: 20
  replication-factor: ${APP_REPLICATION_FACTOR:1}
  # demo runner (active only under the 'demo' profile)
  demo:
    message-count: 25
    settle-millis: 8000
  # analytics rollups (pre-aggregated so the dashboard never scans raw audits)
  analytics:
    rollup:
      enabled: true
      interval-ms: 60000      # how often recent buckets are recomputed
      recompute-hours: 3      # trailing window recomputed each run
      backfill-hours: 26      # one-time window built on startup

logging:
  level:
    root: INFO
    com.codrite.ruleaudit: INFO
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
